<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup Penalty Shootout 2026 - Pitch</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#124e28">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9853366444571043" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b1a0e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* Anti-Scrolling System locks viewport entirely */
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 750px;
            background: #1e3f20; 
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            border-radius: 12px;
        }

        #gameWorld {
            position: relative;
            width: 100%;
            flex: 1; 
            overflow: hidden;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: linear-gradient(135deg, #124e28 0%, #072513 100%);
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
            transition: opacity 0.3s ease;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 5px;
            margin-top: 0;
            text-shadow: 0 3px 6px rgba(0,0,0,0.5);
            color: #f7b500;
            letter-spacing: 1px;
        }

        p { margin: 5px 0 20px 0; color: #ddd; font-size: 15px;}

        .menu-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            width: 85%;
            padding: 18px 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .menu-btn:active {
            background: #f7b500;
            color: #072513;
            border-color: #fff;
            transform: scale(0.96);
            box-shadow: 0 0 15px rgba(247, 181, 0, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-height: 320px; 
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
        }

        .nation-btn {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 15px 5px;
            color: white;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .nation-btn:active, .nation-btn.selected {
            background: #f7b500;
            color: #072513;
            border-color: #fff;
            transform: scale(0.95);
            box-shadow: 0 0 12px rgba(247, 181, 0, 0.4);
        }

        .flag-tag {
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 4px;
            color: #fff;
        }

        .nation-btn.selected .flag-tag {
            background: #072513;
            color: #f7b500;
        }

        button.action-btn {
            background: #f7b500;
            color: #072513;
            border: none;
            padding: 14px 45px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        #turnIndicator {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: #f7b500;
            color: #072513;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 14px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            pointer-events: none;
            display: none;
        }

        #scoreboardUI {
            position: absolute;
            top: 55px; width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            z-index: 5;
            text-shadow: 1px 1px 4px #000;
            pointer-events: none;
            box-sizing: border-box;
            padding: 0 15px;
        }

        #arcadeHUD {
            display: flex;
            justify-content: space-around;
            width: 100%;
            font-size: 15px;
            box-sizing: border-box;
            padding: 0 10px;
            margin-top: -40px; 
        }
        #arcadeHUD div {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .player-board {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 44%;
            display: none;
        }

        .active-board {
            border-color: #f7b500;
            box-shadow: 0 0 10px rgba(247,181,0,0.3);
        }

        .dot-container {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            justify-content: center;
        }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #555;
            border: 1px solid #222;
        }
        .dot.goal { background: #4CD964; }
        .dot.miss { background: #FF3B30; }

        #audioDebug {
            position: absolute;
            bottom: 5px;
            left: 5px;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            z-index: 100;
            pointer-events: none;
        }

        #canvasContainer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #instructions {
            position: absolute;
            bottom: 35px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.85);
            text-shadow: 1px 1px 3px #000;
            pointer-events: none;
            z-index: 5;
            animation: pulse 1.5s infinite alternate;
        }

        .ad-container {
            width: 100%;
            height: 60px;
            background: #072513;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
        }

        @keyframes pulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        
        <div id="gameWorld">
            <div id="audioDebug">Audio Status: Initializing...</div>
            <audio id="bgMusic" src="bgm.mp3" loop preload="auto"></audio>

            <div id="splashScreen" class="screen">
                <h1 style="font-size: 36px; margin-bottom: 30px; color: #f7b500;">PENALTY CUP<br><span style="color:#fff; font-size:20px;">WORLD CUP 2026</span></h1>
                <button class="menu-btn" onclick="selectGameMode('1P')">1 Player Arcade</button>
                <button class="menu-btn" onclick="selectGameMode('2P')" style="border-color: rgba(90, 200, 250, 0.4);">2 Player Local</button>
            </div>

            <div id="selectorScreen" class="screen" style="display: none;">
                <h1 id="selectionTitle">CHOOSE YOUR TEAM</h1>
                <p>Select your nation to take the pitch</p>
                <div class="grid" id="nationGrid"></div>
                <button class="action-btn" id="startBtn" disabled style="opacity: 0.4;">CONFIRM</button>
            </div>

            <div id="turnIndicator">PLAYER 1 SHOOTING</div>

            <div id="scoreboardUI">
                <div id="arcadeHUD" style="display: none;">
                    <div>TEAM: <span id="uiTeam" style="color: #f7b500;">---</span></div>
                    <div>SCORE: <span id="uiScore" style="color: #4CD964;">0</span></div>
                    <div>STREAK: <span id="uiStreak" style="color: #5ac8fa;">0</span></div>
                </div>

                <div id="p1Board" class="player-board">
                    <div style="color: #f7b500;" id="p1Name">P1: ---</div>
                    <div>SCORE: <span id="p1Score" style="color: #4CD964;">0</span></div>
                    <div class="dot-container" id="p1Dots"></div>
                </div>
                <div id="p2Board" class="player-board">
                    <div style="color: #5ac8fa;" id="p2Name">P2: ---</div>
                    <div>SCORE: <span id="p2Score" style="color: #4CD964;">0</span></div>
                    <div class="dot-container" id="p2Dots"></div>
                </div>
            </div>

            <div id="instructions">Flick in a curve to bend your shot!</div>
            
            <div id="canvasContainer">
                <canvas id="gameCanvas"></canvas>
            </div>

            <div id="gameOverScreen" class="screen" style="display: none;">
                <h1 id="winStatusText" style="color: #f7b500; text-shadow: 0 0 10px rgba(247,181,0,0.3);">MATCH OVER</h1>
                <p id="finalScoreText" style="font-size: 18px;">Final Scoreline: 3 - 2</p>
                <button class="action-btn" onclick="resetToMainMenu()">MAIN MENU</button>
            </div>
        </div>

        <div class="ad-container">
            <ins class="adsbygoogle"
                 style="display:inline-block;width:320px;height:50px"
                 data-ad-client="ca-pub-9853366444571043"
                 data-ad-slot="7829401122"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

    </div>

    <script>
        const debugDiv = document.getElementById('audioDebug');

        // --- AUDIO ENGINE ---
        const SoundFX = {
            ctx: null,
            bgAudio: null,

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (!this.bgAudio) {
                    this.bgAudio = document.getElementById('bgMusic');
                    this.bgAudio.volume = 0.4; 
                    this.bgAudio.addEventListener('playing', () => debugDiv.innerText = "Audio Status: Playing bgm.mp3");
                    this.bgAudio.addEventListener('error', (e) => debugDiv.innerText = "Audio Status: Error loading bgm.mp3 file!");
                }
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            startMusic() {
                this.init();
                let playPromise = this.bgAudio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(err => { debugDiv.innerText = "Audio Status: Context Blocked."; });
                }
            },

            stopMusic() {
                if (this.bgAudio) {
                    this.bgAudio.pause();
                    this.bgAudio.currentTime = 0;
                }
            },

            playKick() {
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(45, this.ctx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.12);
                osc.start(); osc.stop(this.ctx.currentTime + 0.12);
            },

            playSave() {
                this.init();
                let bufferSize = this.ctx.sampleRate * 0.15;
                let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                let data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
                let noise = this.ctx.createBufferSource(); noise.buffer = buffer;
                let filter = this.ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(350, this.ctx.currentTime);
                let gain = this.ctx.createGain();
                noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
                gain.gain.setValueAtTime(0.6, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                noise.start(); noise.stop(this.ctx.currentTime + 0.15);
            },

            playGoal() {
                this.init();
                let now = this.ctx.currentTime;
                [440, 554, 659].forEach((freq) => {
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now);
                    osc.frequency.exponentialRampToValueAtTime(freq * 1.5, now + 0.4);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                });
            },

            playGameOver() {
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                let filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.setValueAtTime(300, this.ctx.currentTime);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(70, this.ctx.currentTime + 0.6);
                osc.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.6);
                osc.start(); osc.stop(this.ctx.currentTime + 0.6);
            }
        };

        const nations = [
            { name: 'Argentina', tag: 'ARG', color: '#74ACDF' },
            { name: 'Brazil', tag: 'BRA', color: '#009c3b' },
            { name: 'England', tag: 'ENG', color: '#ce1124' },
            { name: 'France', tag: 'FRA', color: '#002395' },
            { name: 'Germany', tag: 'GER', color: '#111111' },
            { name: 'Spain', tag: 'ESP', color: '#c60b1e' },
            { name: 'USA', tag: 'USA', color: '#0a3161' },
            { name: 'Mexico', tag: 'MEX', color: '#006847' },
            { name: 'Portugal', tag: 'POR', color: '#ff0000' }
        ];

        let activeGameMode = "1P"; 
        let player1Nation = null;
        let player2Nation = null;
        let setupPhase = 1; 

        let score = 0;
        let streak = 0;

        let currentKicker = 1; 
        let currentRound = 1;  
        let isSuddenDeath = false;
        let p1History = []; 
        let p2History = [];

        let selectedNationTmp = null;

        const grid = document.getElementById('nationGrid');
        const startBtn = document.getElementById('startBtn');
        const selectionTitle = document.getElementById('selectionTitle');

        function selectGameMode(mode) {
            activeGameMode = mode;
            SoundFX.startMusic();
            
            document.getElementById('splashScreen').style.display = "none";
            document.getElementById('selectorScreen').style.display = "flex";

            setupPhase = 1;
            selectedNationTmp = null;
            startBtn.disabled = true;
            startBtn.style.opacity = "0.4";

            if (activeGameMode === "1P") {
                selectionTitle.innerText = "CHOOSE YOUR TEAM";
                selectionTitle.style.color = "#f7b500";
            } else {
                selectionTitle.innerText = "PLAYER 1 CHOOSE";
                selectionTitle.style.color = "#f7b500";
            }
            buildSelectionGrid();
        }

        function buildSelectionGrid() {
            grid.innerHTML = "";
            nations.forEach(nation => {
                if (activeGameMode === "2P" && setupPhase === 2 && player1Nation && player1Nation.tag === nation.tag) return;

                const btn = document.createElement('div');
                btn.className = 'nation-btn';
                btn.innerHTML = `<span class="flag-tag">${nation.tag}</span><span>${nation.name}</span>`;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.nation-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedNationTmp = nation;
                    startBtn.disabled = false;
                    startBtn.style.opacity = "1";
                });
                grid.appendChild(btn);
            });
        }

        startBtn.addEventListener('click', () => {
            if (activeGameMode === "1P") {
                player1Nation = selectedNationTmp;
                startGame();
            } else {
                if (setupPhase === 1) {
                    player1Nation = selectedNationTmp;
                    setupPhase = 2;
                    selectedNationTmp = null;
                    startBtn.disabled = true;
                    startBtn.style.opacity = "0.4";
                    selectionTitle.innerText = "PLAYER 2 CHOOSE";
                    selectionTitle.style.color = "#5ac8fa";
                    buildSelectionGrid();
                } else if (setupPhase === 2) {
                    player2Nation = selectedNationTmp;
                    startGame();
                }
            }
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let ball, keeper, goal, gameState;
        let swipePoints = [];
        let isTrackingSwipe = false;
        
        function initEntities() {
            goal = {
                x: canvas.width * 0.15,
                y: 140,
                w: canvas.width * 0.7,
                h: 130
            };

            ball = {
                startX: canvas.width / 2,
                startY: canvas.height - 120,
                x: canvas.width / 2,
                y: canvas.height - 120,
                targetX: 0,
                targetY: 0,
                radius: 22,       
                startRadius: 22,
                targetRadius: 8,  
                progress: 0,      
                speed: 0.035,
                bounceVx: 0,
                bounceVy: 0,
                spin: 0,          
                curveOffsetX: 0   
            };

            let initialSpeed = 2.0;
            let isFifthShotOrSuddenDeath = false;

            if (activeGameMode === "1P") {
                let progressFactor = Math.min(streak, 100) / 100;
                initialSpeed = 1.0 + (progressFactor * 3.2); 
            } else {
                initialSpeed = 1.0 + Math.min((currentRound - 1) * 0.3, 2.2);
                let totalShotsTaken = (currentKicker === 1) ? p1History.length : p2History.length;
                if (totalShotsTaken === 4 || isSuddenDeath) {
                    isFifthShotOrSuddenDeath = true;
                }
            }

            keeper = {
                x: canvas.width / 2,
                baselineY: 240, 
                y: 240,
                w: 54, 
                h: 70,
                dir: Math.random() < 0.5 ? 1 : -1,
                speed: initialSpeed,
                baseSpeed2P: initialSpeed, 
                state: 'idling', 
                targetX: canvas.width / 2,
                targetY: 240,
                isPsychOutActive: isFifthShotOrSuddenDeath,
                psychOutTimer: 0,
                psychOutInterval: 90, 
                isFrozen: false
            };

            gameState = 'aiming';
            swipePoints = [];
            isTrackingSwipe = false;

            if (activeGameMode === "2P") {
                let activeNation = (currentKicker === 1) ? player1Nation : player2Nation;
                document.getElementById('turnIndicator').innerText = `PLAYER ${currentKicker} SHOOTING (${activeNation.tag})`;
                document.getElementById('turnIndicator').style.background = (currentKicker === 1) ? "#f7b500" : "#5ac8fa";
                
                if (currentKicker === 1) {
                    document.getElementById('p1Board').classList.add('active-board');
                    document.getElementById('p2Board').classList.remove('active-board');
                } else {
                    document.getElementById('p1Board').classList.remove('active-board');
                    document.getElementById('p2Board').classList.add('active-board');
                }
            }
        }

        function handleStart(x, y) {
            if (gameState !== 'aiming') return;
            let rect = canvas.getBoundingClientRect();
            let touchX = x - rect.left;
            let touchY = y - rect.top;
            isTrackingSwipe = true;
            swipePoints = [{ x: touchX, y: touchY, time: Date.now() }];
        }

        function handleMove(x, y) {
            if (!isTrackingSwipe || gameState !== 'aiming') return;
            let rect = canvas.getBoundingClientRect();
            let touchX = x - rect.left;
            let touchY = y - rect.top;
            swipePoints.push({ x: touchX, y: touchY, time: Date.now() });
            if (swipePoints.length > 40) swipePoints.shift();
        }

        function handleEnd() {
            if (!isTrackingSwipe || swipePoints.length < 3) {
                isTrackingSwipe = false;
                return;
            }
            isTrackingSwipe = false;

            let first = swipePoints[0];
            let last = swipePoints[swipePoints.length - 1];
            let duration = last.time - first.time;
            let diffY = last.y - first.y;
            let diffX = last.x - first.x;

            if (diffY < -40 && duration < 400) { 
                SoundFX.playKick();

                ball.targetX = ball.startX + (diffX * 1.3);

                let rawForceY = Math.abs(diffY) / duration; 
                let baselineGoalBottomY = goal.y + goal.h; 
                let optimalShotZoneHeight = goal.h - 15;   

                if (rawForceY < 2.0) {
                    ball.targetY = baselineGoalBottomY - (rawForceY * (optimalShotZoneHeight / 2.0));
                } else if (rawForceY >= 2.0 && rawForceY < 4.8) {
                    let logarithmicBuffer = Math.log(rawForceY - 1.0) * 35;
                    ball.targetY = (baselineGoalBottomY - optimalShotZoneHeight) + 12 - logarithmicBuffer;
                } else {
                    let excessVelocityForce = rawForceY - 4.8;
                    ball.targetY = goal.y - 12 - (excessVelocityForce * 18);
                }

                let maxDeviation = 0;
                for (let i = 1; i < swipePoints.length - 1; i++) {
                    let p = swipePoints[i];
                    let numerator = (last.y - first.y) * p.x - (last.x - first.x) * p.y + last.x * first.y - last.y * first.x;
                    let denominator = Math.sqrt(Math.pow(last.y - first.y, 2) + Math.pow(last.x - first.x, 2));
                    let distance = denominator !== 0 ? (numerator / denominator) : 0;
                    if (Math.abs(distance) > Math.abs(maxDeviation)) maxDeviation = distance;
                }

                ball.spin = maxDeviation * -1.8; 
                ball.targetX += (ball.spin * 0.4);
                
                if (ball.targetY >= goal.y) {
                    ball.targetX = Math.max(goal.x - 35, Math.min(goal.x + goal.w + 35, ball.targetX));
                }

                ball.progress = 0;
                gameState = 'shooting';
                keeper.state = 'diving';
                
                keeper.isFrozen = false;
                if (activeGameMode === "2P") {
                    keeper.speed = keeper.baseSpeed2P;
                }

                let errorMargin = (Math.random() * 80 - 40); 
                keeper.targetX = Math.max(goal.x + 10, Math.min(goal.x + goal.w - 10, ball.targetX + errorMargin));

                if (ball.targetY < keeper.baselineY - 40) {
                    let calculatedLift = (keeper.baselineY - ball.targetY) * 0.55;
                    keeper.targetY = keeper.baselineY - Math.min(calculatedLift, 65);
                } else {
                    keeper.targetY = keeper.baselineY;
                }
            }
        }

        canvas.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY));
        canvas.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX, e.touches[0].clientY));
        canvas.addEventListener('touchend', () => handleEnd());
        canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
        canvas.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        canvas.addEventListener('mouseup', () => handleEnd());

        function update() {
            if (gameState === 'aiming') {
                if (activeGameMode === "2P" && keeper.isPsychOutActive) {
                    keeper.psychOutTimer++;
                    if (keeper.psychOutTimer >= keeper.psychOutInterval) {
                        keeper.psychOutTimer = 0;
                        let rngDecision = Math.random();
                        if (rngDecision < 0.25) {
                            keeper.isFrozen = true;
                        } else {
                            keeper.isFrozen = false;
                            keeper.speed = keeper.baseSpeed2P * (0.4 + Math.random() * 1.2);
                            if (Math.random() < 0.5) keeper.dir *= -1;
                        }
                    }
                }

                if (!keeper.isFrozen) {
                    keeper.x += keeper.speed * keeper.dir;
                }

                if (keeper.x - keeper.w/2 < goal.x || keeper.x + keeper.w/2 > goal.x + goal.w) {
                    keeper.dir *= -1;
                    keeper.x = keeper.x - keeper.w/2 < goal.x ? goal.x + keeper.w/2 : goal.x + goal.w - keeper.w/2;
                }
                keeper.y = keeper.baselineY;
            }

            if (gameState === 'shooting') {
                ball.progress += ball.speed;
                if (ball.progress > 1) ball.progress = 1;

                let curveFactor = Math.sin(ball.progress * Math.PI); 
                ball.curveOffsetX = ball.spin * curveFactor;

                ball.x = (ball.startX + (ball.targetX - ball.startX) * ball.progress) + ball.curveOffsetX;
                ball.y = ball.startY + (ball.targetY - ball.startY) * ball.progress;
                ball.radius = ball.startRadius + (ball.targetRadius - ball.startRadius) * ball.progress;

                if (keeper.state === 'diving') {
                    keeper.x += (keeper.targetX - keeper.x) * 0.055; 
                    keeper.y += (keeper.targetY - keeper.y) * 0.055; 
                }

                if (ball.progress >= 1) {
                    let hitKeeperWidth = keeper.w / 2 + 5; 
                    
                    if (ball.x >= keeper.x - hitKeeperWidth && ball.x <= keeper.x + hitKeeperWidth && ball.y >= keeper.y - 45 && ball.y <= keeper.y + 45) {
                        SoundFX.playSave();
                        gameState = 'rebounding';
                        let hitOffset = (ball.x - keeper.x) / hitKeeperWidth; 
                        ball.bounceVx = hitOffset * 4 - (ball.spin * 0.02);   
                        ball.bounceVy = 5.5;             
                        return;
                    }

                    if (ball.x >= goal.x && ball.x <= goal.x + goal.w && ball.y >= goal.y && ball.y <= goal.y + goal.h) {
                        processResult(true); 
                    } else {
                        processResult(false); 
                    }
                    return;
                }
            }

            if (gameState === 'rebounding') {
                ball.x += ball.bounceVx; ball.y += ball.bounceVy;
                if (ball.radius < ball.startRadius * 0.8) ball.radius += 0.4;
                ball.bounceVx *= 0.98; ball.bounceVy *= 0.95;
                if (ball.bounceVy < 0.8) processResult(false);
            }
        }

        function draw() {
            let pitchGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            pitchGrad.addColorStop(0, '#0a230c'); pitchGrad.addColorStop(0.3, '#113b15'); pitchGrad.addColorStop(1, '#1e5e25');   
            ctx.fillStyle = pitchGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            for (let i = 0; i < 6; i++) {
                if (i % 2 === 0) {
                    ctx.beginPath();
                    let topY = goal.y + goal.h + (i * 40); let botY = goal.y + goal.h + ((i + 1) * 70);
                    ctx.moveTo(0, topY); ctx.lineTo(canvas.width, topY); ctx.lineTo(canvas.width, botY); ctx.lineTo(0, botY);
                    ctx.fill();
                }
            }

            ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(goal.x - 40, goal.y + goal.h); ctx.lineTo(0, canvas.height - 50);
            ctx.moveTo(goal.x + goal.w + 40, goal.y + goal.h); ctx.lineTo(canvas.width, canvas.height - 50);
            ctx.moveTo(0, canvas.height - 50); ctx.lineTo(canvas.width, canvas.height - 50);
            ctx.stroke();
            
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height - 120, 6, 0, Math.PI * 2); ctx.fill();

            let netShadow = ctx.createLinearGradient(0, goal.y, 0, goal.y + goal.h);
            netShadow.addColorStop(0, 'rgba(0,0,0,0.6)'); netShadow.addColorStop(1, 'rgba(0,0,0,0.1)');
            ctx.fillStyle = netShadow; ctx.fillRect(goal.x, goal.y, goal.w, goal.h);

            ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
            for (let x = goal.x; x <= goal.x + goal.w; x += 10) { 
                ctx.beginPath(); ctx.moveTo(x, goal.y); ctx.lineTo(x, goal.y + goal.h); ctx.stroke(); 
            }
            for (let y = goal.y; y <= goal.y + goal.h; y += 10) { 
                ctx.beginPath(); ctx.moveTo(goal.x, y); ctx.lineTo(goal.x + goal.w, y); ctx.stroke(); 
            }

            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath(); ctx.moveTo(goal.x, goal.y + goal.h); ctx.lineTo(goal.x, goal.y); ctx.lineTo(goal.x + goal.w, goal.y); ctx.lineTo(goal.x + goal.w, goal.y + goal.h); ctx.stroke();

            ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.beginPath();
            let shadowY = (gameState === 'rebounding') ? ball.y + 25 : ball.startY + ((goal.y + goal.h + 10) - ball.startY) * ball.progress;
            let shadowScale = (gameState === 'rebounding') ? Math.max(0.3, (1 - (ball.bounceVy / 10))) : 1 - (ball.progress * 0.4);
            ctx.ellipse(ball.x, shadowY, ball.radius * 1.1 * shadowScale, ball.radius * 0.4 * shadowScale, 0, 0, Math.PI * 2);
            ctx.fill();

            let currentDefendingColor = '#ff5722';
            if (activeGameMode === "1P" && player1Nation) {
                currentDefendingColor = '#ff5722'; 
            } else if (activeGameMode === "2P") {
                let currentDefendingNation = (currentKicker === 1) ? player2Nation : player1Nation;
                if (currentDefendingNation) currentDefendingColor = currentDefendingNation.color;
            }
            
            ctx.save(); ctx.translate(keeper.x, keeper.y);
            ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.beginPath(); ctx.ellipse(0, 30 + (keeper.baselineY - keeper.y), keeper.w * 0.6, 8, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#222'; ctx.fillRect(-18, 22, 10, 8); ctx.fillRect(8, 22, 10, 8);
            ctx.fillStyle = '#fff'; ctx.fillRect(-16, 10, 7, 12); ctx.fillRect(9, 10, 7, 12);
            ctx.fillStyle = '#111111'; ctx.fillRect(-18, -2, 36, 14);
            ctx.fillStyle = currentDefendingColor; ctx.fillRect(-20, -37, 40, 35);

            if (gameState === 'shooting' || keeper.state === 'diving') {
                ctx.fillRect(-32, -32, 12, 10); ctx.fillRect(20, -32, 12, 10);  
            } else {
                ctx.fillRect(-28, -27, 9, 22); ctx.fillRect(19, -27, 9, 22);
            }
            ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(0, -48, 11, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#333'; ctx.fillRect(-8, -59, 16, 5);
            ctx.restore();

            ctx.save(); ctx.translate(ball.x, ball.y);
            ctx.rotate((ball.progress * 4.5) + ((ball.spin * 0.05) * ball.progress));
            ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = Math.max(1.5, ball.radius * 0.08);
            ctx.beginPath(); ctx.arc(0, 0, Math.max(ball.radius, 3), 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            
            ctx.fillStyle = '#1a1a1a';
            let r = ball.radius;
            if (r > 4) {
                ctx.beginPath(); ctx.arc(0, 0, r * 0.32, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = Math.max(1, r * 0.05);
                for (let a = 0; a < Math.PI * 2; a += (Math.PI * 2 / 5)) {
                    ctx.beginPath(); ctx.moveTo(Math.cos(a) * (r * 0.32), Math.sin(a) * (r * 0.32)); ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r); ctx.stroke();
                }
            }
            ctx.restore();

            if (gameState === 'result') {
                ctx.fillStyle = feedbackColor; ctx.font = 'bold 44px sans-serif'; ctx.textAlign = 'center';
                ctx.shadowBlur = 12; ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.fillText(feedbackText, canvas.width / 2, canvas.height * 0.52);
                ctx.shadowBlur = 0;
            }
        }

        let feedbackText = "";
        let feedbackColor = "#fff";

        function processResult(isGoal) {
            gameState = 'result';

            if (isGoal) {
                SoundFX.playGoal();
                feedbackText = "GOAL!"; feedbackColor = "#4CD964";
            } else {
                SoundFX.playSave();
                feedbackText = "MISS!"; feedbackColor = "#FF3B30";
            }

            if (activeGameMode === "1P") {
                if (isGoal) {
                    score++; streak++;
                    document.getElementById('uiScore').innerText = score;
                    document.getElementById('uiStreak').innerText = streak;
                    setTimeout(() => { initEntities(); }, 1400);
                } else {
                    SoundFX.stopMusic(); SoundFX.playGameOver();
                    feedbackText = "MATCH OVER"; feedbackColor = "#FF3B30";
                    setTimeout(() => {
                        gameState = 'over';
                        document.getElementById('winStatusText').innerText = "OUT OF THE CUP!";
                        document.getElementById('winStatusText').style.color = "#FF3B30";
                        document.getElementById('finalScoreText').innerText = `You scored ${score} penalties for ${player1Nation.name}.`;
                        document.getElementById('gameOverScreen').style.display = 'flex';
                    }, 1400);
                }
            } else {
                let resultString = isGoal ? 'goal' : 'miss';
                if (currentKicker === 1) p1History.push(resultString);
                else p2History.push(resultString);

                syncScoreboardDots();
                setTimeout(() => { evaluateMatchState2P(); }, 1400);
            }
        }

        function syncScoreboardDots() {
            let p1Goals = p1History.filter(r => r === 'goal').length;
            let p2Goals = p2History.filter(r => r === 'goal').length;

            document.getElementById('p1Score').innerText = p1Goals;
            document.getElementById('p2Score').innerText = p2Goals;

            let p1Html = "";
            let maxDots = Math.max(5, p1History.length);
            for(let i=0; i<maxDots; i++) {
                let cl = "dot";
                if(p1History[i] === 'goal') cl += " goal";
                if(p1History[i] === 'miss') cl += " miss";
                p1Html += `<div class="${cl}"></div>`;
            }
            document.getElementById('p1Dots').innerHTML = p1Html;

            let p2Html = "";
            maxDots = Math.max(5, p2History.length);
            for(let i=0; i<maxDots; i++) {
                let cl = "dot";
                if(p2History[i] === 'goal') cl += " goal";
                if(p2History[i] === 'miss') cl += " miss";
                p2Html += `<div class="${cl}"></div>`;
            }
            document.getElementById('p2Dots').innerHTML = p2Html;
        }

        function evaluateMatchState2P() {
            let p1Goals = p1History.filter(r => r === 'goal').length;
            let p2Goals = p2History.filter(r => r === 'goal').length;
            let p1ShotsTaken = p1History.length;
            let p2ShotsTaken = p2History.length;

            if (!isSuddenDeath) {
                let p1Remaining = 5 - p1ShotsTaken;
                let p2Remaining = 5 - p2ShotsTaken;

                if (p1Goals + p1Remaining < p2Goals) { endGame2P(2); return; }
                if (p2Goals + p2Remaining < p1Goals) { endGame2P(1); return; }

                if (p1ShotsTaken === 5 && p2ShotsTaken === 5) {
                    if (p1Goals === p2Goals) {
                        isSuddenDeath = true; currentRound = 6; currentKicker = 1;
                        initEntities();
                    } else {
                        endGame2P(p1Goals > p2Goals ? 1 : 2);
                    }
                } else { advanceTurn2P(); }
            } else {
                if (p1ShotsTaken === p2ShotsTaken) {
                    if (p1Goals !== p2Goals) { endGame2P(p1Goals > p2Goals ? 1 : 2); }
                    else { currentRound++; currentKicker = 1; initEntities(); }
                } else { advanceTurn2P(); }
            }
        }

        function advanceTurn2P() {
            if (currentKicker === 1) currentKicker = 2;
            else { currentKicker = 1; if (!isSuddenDeath) currentRound++; }
            initEntities();
        }

        function startGame() {
            document.getElementById('selectorScreen').style.display = 'none';
            
            if (activeGameMode === "1P") {
                document.getElementById('turnIndicator').style.display = "none";
                document.getElementById('p1Board').style.display = "none";
                document.getElementById('p2Board').style.display = "none";
                document.getElementById('arcadeHUD').style.display = "flex";

                document.getElementById('uiTeam').innerText = player1Nation.tag + " " + player1Nation.name;
                score = 0; streak = 0;
                document.getElementById('uiScore').innerText = score;
                document.getElementById('uiStreak').innerText = streak;
            } else {
                document.getElementById('arcadeHUD').style.display = "none";
                document.getElementById('turnIndicator').style.display = "block";
                document.getElementById('p1Board').style.display = "block";
                document.getElementById('p2Board').style.display = "block";

                document.getElementById('p1Name').innerText = `P1: ${player1Nation.name}`;
                document.getElementById('p2Name').innerText = `P2: ${player2Nation.name}`;

                p1History = []; p2History = [];
                currentKicker = 1; currentRound = 1; isSuddenDeath = false;
                syncScoreboardDots();
            }

            initEntities();
            gameLoop();
        }

        function endGame2P(winner) {
            gameState = 'over';
            SoundFX.stopMusic(); SoundFX.playGameOver();

            let p1Final = p1History.filter(r => r === 'goal').length;
            let p2Final = p2History.filter(r => r === 'goal').length;
            let winnerName = (winner === 1) ? player1Nation.name : player2Nation.name;

            document.getElementById('winStatusText').innerText = `${winnerName.toUpperCase()} WINS!`;
            document.getElementById('winStatusText').style.color = (winner === 1) ? "#f7b500" : "#5ac8fa";
            document.getElementById('finalScoreText').innerText = `Final Scoreline: ${p1Final} - ${p2Final} ${isSuddenDeath ? '(AET)' : ''}`;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function gameLoop() {
            update(); draw();
            if (gameState !== 'over') requestAnimationFrame(gameLoop);
        }

        function resetToMainMenu() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('selectorScreen').style.display = 'none';
            document.getElementById('splashScreen').style.display = 'flex';
        }
    </script>
</body>
