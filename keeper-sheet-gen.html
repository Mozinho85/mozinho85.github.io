<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Keeper Pose Sheet Generator</title>
<style>html,body{margin:0;background:#111;}canvas{display:block;margin:10px auto;}</style>
</head>
<body>
<canvas id="sheet"></canvas>
<script>
// === Reference sprite sheet of the goalkeeper's animation poses ===
// Uses the EXACT drawing code from game.js draw(), parameterized per frame,
// rendered in neutral grey so each pose can be re-sculpted in claymation.

// --- copied helpers (game.js) ---
function roundRectPath(c,x,y,w,h,r){ r=Math.min(r,w/2,h/2); c.beginPath(); c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

function applyKitTexture(t,x,y,w,h,nation,isGoalkeeper,detailed){
  t.save(); t.beginPath(); t.rect(x,y,w,h); t.clip();
  const dc=nation.detailColor;
  if(isGoalkeeper){
    t.fillStyle=nation.keeperColor; t.fillRect(x,y,w,h);
    t.fillStyle='rgba(255,255,255,0.16)'; t.fillRect(x,y,w,h*0.32);
    t.fillStyle=dc; t.fillRect(x,y+h*0.56,w,Math.max(1,h*0.07));
  }
  if(detailed){
    let g=t.createLinearGradient(x,y,x,y+h);
    g.addColorStop(0,'rgba(255,255,255,0.22)'); g.addColorStop(0.45,'rgba(255,255,255,0.03)'); g.addColorStop(1,'rgba(0,0,0,0.32)');
    t.fillStyle=g; t.fillRect(x,y,w,h);
    let sl=t.createLinearGradient(x,0,x+w*0.20,0); sl.addColorStop(0,'rgba(0,0,0,0.28)'); sl.addColorStop(1,'rgba(0,0,0,0)');
    t.fillStyle=sl; t.fillRect(x,y,w*0.20,h);
    let sr=t.createLinearGradient(x+w,0,x+w*0.80,0); sr.addColorStop(0,'rgba(0,0,0,0.28)'); sr.addColorStop(1,'rgba(0,0,0,0)');
    t.fillStyle=sr; t.fillRect(x+w*0.80,y,w*0.20,h);
  }
  t.fillStyle='#f7b500'; t.beginPath(); t.arc(x+w*0.30,y+h*0.42,detailed?1.8:1.1,0,Math.PI*2); t.fill();
  t.restore();
}

// --- keeper, extracted from draw() and parameterized by a pose object k ---
// k = { state:'idling'|'diving'|'celebrating', angle, diveDir, scale, walkPhase, celebPhase }
function drawKeeper(ctx, k, nation){
  ctx.save();
  const gkc=nation.keeperColor, gkd=nation.detailColor;
  const celebrating = k.state==='celebrating';
  const diving = !celebrating && k.state!=='idling';
  const sc=k.scale||1; ctx.scale(sc,sc);

  // Ground shadow (baselineY===y here, so offset is 0)
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath();
  const gkShadowY = celebrating ? 33 : 30;
  ctx.ellipse(0, gkShadowY, 54*0.6, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // Body lean (dive only)
  ctx.translate(0,6); ctx.rotate((k.angle||0)*(k.diveDir||0)); ctx.translate(0,-6);

  // Legs
  let hipY=11, footLx,footLy,footRx,footRy;
  if(k.state==='idling'){ const wp=k.walkPhase||0; const sL=Math.sin(wp),sR=Math.sin(wp+Math.PI);
    footLx=-6+sL*2; footLy=30-Math.max(0,sL)*5; footRx=6+sR*2; footRy=30-Math.max(0,sR)*5; }
  else if(celebrating){ const cp=k.celebPhase||0; const sL=Math.sin(cp),sR=Math.sin(cp+Math.PI);
    footLx=-6+sL*5; footLy=30-Math.max(0,sL)*9; footRx=6+sR*5; footRy=30-Math.max(0,sR)*9; }
  else { const ext=Math.min(1,(k.angle||0)/1.2); footLx=-6-ext*9; footLy=30-ext*5; footRx=6+ext*9; footRy=30-ext*5; }
  ctx.lineCap='round';
  ctx.strokeStyle='#f2f2f2'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(-6,hipY); ctx.lineTo(footLx,footLy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,hipY); ctx.lineTo(footRx,footRy); ctx.stroke();
  ctx.strokeStyle=gkd; ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(-6+(footLx+6)*0.18,hipY+(footLy-hipY)*0.18); ctx.lineTo(-6+(footLx+6)*0.30,hipY+(footLy-hipY)*0.30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6+(footRx-6)*0.18,hipY+(footRy-hipY)*0.18); ctx.lineTo(6+(footRx-6)*0.30,hipY+(footRy-hipY)*0.30); ctx.stroke();
  ctx.fillStyle='#1a1a1a';
  roundRectPath(ctx,footLx-6,footLy-2,12,5,2); ctx.fill();
  roundRectPath(ctx,footRx-6,footRy-2,12,5,2); ctx.fill();
  // Shorts
  ctx.fillStyle='#15171a'; roundRectPath(ctx,-16,2,32,16,4); ctx.fill();
  ctx.fillStyle=gkd; ctx.fillRect(-16,14,32,2);
  // Jersey
  ctx.save(); roundRectPath(ctx,-18,-33,36,37,7); ctx.clip();
  applyKitTexture(ctx,-18,-33,36,37,nation,true,true); ctx.restore();
  // Collar
  ctx.strokeStyle=gkd; ctx.lineWidth=2.2;
  ctx.beginPath(); ctx.arc(0,-33,6,0.18*Math.PI,0.82*Math.PI); ctx.stroke();
  // Arms
  const shL=-15,shR=15,shY=-26; let hand;
  if(celebrating){ const cp=k.celebPhase||0; hand={lx:-19,ly:-52+Math.sin(cp)*4,rx:19,ry:-52+Math.sin(cp+Math.PI)*4}; }
  else if(diving){ const ext=Math.min(1,(k.angle||0)/1.2); hand={lx:-16-ext*5,ly:-46-ext*13,rx:16+ext*5,ry:-46-ext*13}; }
  else { hand={lx:-27,ly:-7,rx:27,ry:-7}; }
  ctx.lineCap='round';
  ctx.strokeStyle=gkc; ctx.lineWidth=9;
  ctx.beginPath(); ctx.moveTo(shL,shY); ctx.lineTo(hand.lx,hand.ly); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(shR,shY); ctx.lineTo(hand.rx,hand.ry); ctx.stroke();
  ctx.strokeStyle=gkd; ctx.lineWidth=9;
  ctx.beginPath(); ctx.moveTo(shL+(hand.lx-shL)*0.80,shY+(hand.ly-shY)*0.80); ctx.lineTo(shL+(hand.lx-shL)*0.93,shY+(hand.ly-shY)*0.93); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(shR+(hand.rx-shR)*0.80,shY+(hand.ry-shY)*0.80); ctx.lineTo(shR+(hand.rx-shR)*0.93,shY+(hand.ry-shY)*0.93); ctx.stroke();
  [[hand.lx,hand.ly],[hand.rx,hand.ry]].forEach(([hx,hy])=>{
    ctx.fillStyle='#ffffff'; roundRectPath(ctx,hx-5.5,hy-5.5,11,11,3); ctx.fill();
    ctx.strokeStyle=gkd; ctx.lineWidth=1.5; roundRectPath(ctx,hx-5.5,hy-5.5,11,11,3); ctx.stroke();
  });
  // Neck, head, hair
  ctx.fillStyle='#e3a877'; ctx.fillRect(-3.5,-40,7,9);
  ctx.fillStyle='#ffcd9b'; ctx.beginPath(); ctx.arc(0,-45,9.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2a1a0e'; ctx.beginPath(); ctx.arc(0,-47,9.5,Math.PI*0.92,Math.PI*2.08); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.beginPath(); ctx.arc(3,-45,9.5,-0.5*Math.PI,0.4*Math.PI); ctx.fill();
  ctx.restore();
}

// --- layout the sheet ---
const NEUTRAL = { keeperColor:'#cfcfcf', detailColor:'#8a8a8a' };
const rows = [
  { label:'Idle / patrol  —  walk cycle (loops)',
    frames:[0,Math.PI/2,Math.PI,3*Math.PI/2].map(p=>({state:'idling',walkPhase:p})) },
  { label:'Dive LEFT  —  commitment 0 → full (angle 0.3→1.2)',
    frames:[0.3,0.6,0.9,1.2].map(a=>({state:'diving',diveDir:-1,angle:a})) },
  { label:'Dive RIGHT  —  commitment 0 → full (mirror of left)',
    frames:[0.3,0.6,0.9,1.2].map(a=>({state:'diving',diveDir:1,angle:a})) },
  { label:'Celebrate  —  arms-aloft run cycle (loops), scales up',
    frames:[0,Math.PI/2,Math.PI,3*Math.PI/2].map(p=>({state:'celebrating',celebPhase:p,scale:1.1})) },
];

const COLS=4, CELLW=150, CELLH=165, PADX=20, TOP=46, LABELH=24, SCALE=2;
const Wl = PADX*2 + COLS*CELLW;
const Hl = TOP + rows.length*(LABELH+CELLH) + 16;
const cv = document.getElementById('sheet');
cv.width=Wl*SCALE; cv.height=Hl*SCALE;
const ctx=cv.getContext('2d'); ctx.scale(SCALE,SCALE);

// background
ctx.fillStyle='#1f2127'; ctx.fillRect(0,0,Wl,Hl);
ctx.fillStyle='#e8e8e8'; ctx.font='600 18px Segoe UI, sans-serif'; ctx.textBaseline='middle';
ctx.fillText('Goalkeeper animation poses — neutral base for claymation conversion', PADX, TOP/2);

rows.forEach((row,ri)=>{
  const rowY = TOP + ri*(LABELH+CELLH);
  ctx.fillStyle='#f7b500'; ctx.font='600 13px Segoe UI, sans-serif'; ctx.textBaseline='middle';
  ctx.fillText(row.label, PADX, rowY + LABELH/2);
  row.frames.forEach((fr,ci)=>{
    const cx = PADX + ci*CELLW, cy = rowY + LABELH;
    // cell
    ctx.fillStyle='#3a3d44'; ctx.strokeStyle='#555'; ctx.lineWidth=1;
    roundRectPath(ctx,cx+4,cy+4,CELLW-8,CELLH-8,8); ctx.fill(); ctx.stroke();
    // ground guide line
    const originX = cx+CELLW/2, originY = cy+CELLH-46;
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx+12, originY+30); ctx.lineTo(cx+CELLW-12, originY+30); ctx.stroke();
    // centre guide
    ctx.strokeStyle='rgba(255,255,255,0.07)';
    ctx.beginPath(); ctx.moveTo(originX, cy+10); ctx.lineTo(originX, cy+CELLH-10); ctx.stroke();
    // keeper
    ctx.save(); ctx.translate(originX, originY); drawKeeper(ctx, fr, NEUTRAL); ctx.restore();
    // frame caption
    ctx.fillStyle='#9aa'; ctx.font='11px Segoe UI, sans-serif'; ctx.textBaseline='alphabetic';
    ctx.fillText('f'+(ci+1), cx+10, cy+CELLH-10);
  });
});

window.addEventListener('load', ()=>{
  fetch('http://127.0.0.1:7900/', { method:'POST', headers:{'X-Name':'keeper-poses-reference.png'}, body: cv.toDataURL('image/png') })
    .then(r=>r.text()).then(t=>{ window.__SAVED__=t; }).catch(e=>{ window.__SAVED__='ERR:'+e.message; });
});
</script>
</body>
</html>
